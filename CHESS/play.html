<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess · Otherside Session</title>

  <!-- chessboard.js (drag-drop 2D board) + chess.js for local legality hints -->
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css" />

  <style>
    /* ==========================================================
       CSS variables below are the single source of truth for all
       colors. The theme switcher (bottom of this <script> block)
       rewrites these via document.documentElement.style.setProperty
       so ONE click re-themes the entire app: chrome, board, pieces.
       Default values here match the "Toxic" (neon green) theme for
       backward-compatibility with the original design.
       ========================================================== */
    :root {
      --bg:            #0a0d0a;
      --panel:         #121611;
      --ink:           #e8f5d8;
      --muted:         #7d8f70;
      --accent:        #39ff14;
      --accent-dim:    #1e8e0c;
      --line:          #1f2a1c;
      --danger:        #ff3366;
      --sq-light:      #e7ecdc;
      --sq-dark:       #384232;
      --scanline-tint: rgba(57,255,20,0.02);
      --glow-tint:     rgba(57,255,20,0.08);
      --accent-glow:   rgba(57,255,20,0.45);  /* for header text-shadow */
      --accent-hover:  rgba(57,255,20,0.5);   /* for button hover glow */
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
      min-height: 100vh;
      /* subtle scanline texture - tint comes from theme */
      background-image:
        repeating-linear-gradient(0deg, var(--scanline-tint) 0 1px, transparent 1px 3px),
        radial-gradient(1200px 600px at 50% -10%, var(--glow-tint), transparent 60%);
    }

    .app {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 20px 60px;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 28px;
    }
    @media (max-width: 860px) {
      .app { grid-template-columns: 1fr; }
    }

    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 8px;
    }
    h1 {
      font-family: "Space Mono", "JetBrains Mono", monospace;
      font-weight: 700;
      font-size: 22px;
      margin: 0;
      letter-spacing: 0.02em;
    }
    h1 .accent {
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent-glow);
    }
    .conn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 8px var(--danger);
    }
    .dot.live {
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.45; }
    }

    .board-wrap {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 18px;
      position: relative;
    }
    #board {
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
    }

    /* Board square colors now driven by theme CSS variables */
    .white-1e1d7 { background: var(--sq-light) !important; }
    .black-3c85d { background: var(--sq-dark) !important; }
    .highlight-last {
      box-shadow: inset 0 0 0 3px var(--accent) !important;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 18px 16px;
      border-radius: 4px;
    }
    .card h2 {
      margin: 0 0 12px 0;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }
    .status {
      font-family: "Space Mono", monospace;
      font-size: 18px;
      color: var(--ink);
    }
    .status.check { color: var(--accent); text-shadow: 0 0 8px var(--accent-dim); }

    .meta {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 6px 14px;
      font-size: 12px;
      color: var(--muted);
    }
    .meta .v { color: var(--ink); word-break: break-all; }

    button.reset {
      width: 100%;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent-dim);
      padding: 12px;
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    button.reset:hover {
      background: var(--accent);
      color: var(--bg);
      box-shadow: 0 0 18px var(--accent-hover);
    }

    .moves {
      max-height: 220px;
      overflow-y: auto;
      font-size: 13px;
      line-height: 1.6;
      color: var(--ink);
      font-family: "Space Mono", monospace;
    }
    .moves .ply { color: var(--muted); margin-right: 6px; }

    /* THEME SWITCHER - 6 small colored squares in a row, matching the
       back-of-clock switch panel from the MML 3D version. Each switch
       is colored with its theme's signature hue. Active = brighter +
       ring outline. Inactive = dimmed. Click any to jump to that theme. */
    .theme-switches {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }
    .theme-sw {
      aspect-ratio: 1;
      border-radius: 3px;
      border: 1px solid var(--line);
      cursor: pointer;
      position: relative;
      transition: all 0.15s ease;
      filter: saturate(0.55) brightness(0.7);
    }
    .theme-sw:hover {
      filter: saturate(0.85) brightness(0.95);
      transform: translateY(-1px);
    }
    .theme-sw.active {
      filter: saturate(1) brightness(1);
      border-color: var(--ink);
      box-shadow: 0 0 10px var(--accent-glow), inset 0 0 0 1px rgba(255,255,255,0.3);
      transform: translateY(-2px);
    }
    .theme-sw .label {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
      pointer-events: none;
    }
    .theme-sw.active .label { color: var(--ink); }

    footer {
      grid-column: 1 / -1;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      margin-top: 20px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">
    <header>
      <h1>CHESS · <span class="accent">OTHERSIDE</span> LIVE SESSION</h1>
      <span class="conn"><span id="conn-dot" class="dot"></span><span id="conn-text">connecting</span></span>
    </header>

    <div class="board-wrap">
      <div id="board"></div>
    </div>

    <aside class="sidebar">
      <div class="card">
        <h2>Theme</h2>
        <div class="theme-switches" id="theme-switches">
          <!-- Populated by JS: 6 switches matching the MML back-of-clock panel -->
        </div>
        <div style="height: 22px;"></div>
      </div>

      <div class="card">
        <h2>Status</h2>
        <div id="status" class="status">--</div>
      </div>

      <div class="card">
        <h2>Move history</h2>
        <div id="moves" class="moves">No moves yet.</div>
      </div>

      <div class="card">
        <h2>Session</h2>
        <div class="meta">
          <span>FEN</span><span id="fen" class="v">--</span>
          <span>MML</span><span id="mml-url" class="v">--</span>
        </div>
      </div>

      <button class="reset" id="reset">Reset game</button>
    </aside>

    <footer>
      Render in-world · MML WebSocket open · Moves replicate in real time
    </footer>
  </div>

  <!-- jQuery is required by chessboard.js v1 -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <!-- chess.js for client-side legality hints (optional - server is source of truth) -->
  <script src="https://unpkg.com/chess.js@0.10.3/chess.js"></script>

  <script>
    const statusEl = document.getElementById('status');
    const fenEl = document.getElementById('fen');
    const mmlUrlEl = document.getElementById('mml-url');
    const movesEl = document.getElementById('moves');
    const connDot = document.getElementById('conn-dot');
    const connText = document.getElementById('conn-text');
    const resetBtn = document.getElementById('reset');

    // Show the MML WebSocket URL so the user can paste it into Otherside/MML editor.
    const wsProto = location.protocol === 'https:' ? 'wss' : 'ws';
    const mmlWsUrl = `${wsProto}://${location.host}/mml`;
    mmlUrlEl.textContent = mmlWsUrl;

    // Client-side chess for legality hints only. Server has final say.
    const localChess = new Chess();

    let ws;
    let lastMoveSquares = null;

    function setConnected(live) {
      connDot.classList.toggle('live', !!live);
      connText.textContent = live ? 'live' : 'disconnected';
    }

    function onDragStart(source, piece) {
      if (localChess.game_over()) return false;
      // Only allow the side to move to drag.
      if ((localChess.turn() === 'w' && piece.search(/^b/) !== -1) ||
          (localChess.turn() === 'b' && piece.search(/^w/) !== -1)) {
        return false;
      }
    }

    function onDrop(source, target) {
      // Try the move locally for instant feedback. Server will confirm/reject.
      const move = localChess.move({ from: source, to: target, promotion: 'q' });
      if (move === null) return 'snapback';
      // Send to server.
      ws.send(JSON.stringify({ type: 'move', from: source, to: target, promotion: 'q' }));
    }

    function onSnapEnd() {
      board.position(localChess.fen());
    }

    // ============================================================

    // Each theme defines: chrome colors (bg/panel/ink/accent/etc.),
    // board square colors (sqLight/sqDark), and piece colors (white/black).
    // Piece SVGs are recolored on-the-fly by string-replacing the fill
    // colors inside the data-URIs (original uses %23fff and %23000 = #fff/#000).
    // 'sig' = signature color for the switch swatch (unique per theme so
    // the row reads as a clear rainbow of theme identifiers).
    // ============================================================
    const THEMES = {
      classic: {

        accent: '#ff9500', accentDim: '#8a5010',
        line: '#1a3040', danger: '#ff3366',
        sqLight: '#1e4a5c', sqDark: '#0a1f2a',
        white: '#ffffff', black: '#1e3ecc',
        scanline: 'rgba(30,62,204,0.025)', glow: 'rgba(30,62,204,0.10)',
        accentGlow: 'rgba(255,149,0,0.45)', accentHover: 'rgba(255,149,0,0.5)',
      },
      neon: {

        sig: '#ff00aa',
        bg: '#0a0014', panel: '#14021e', ink: '#f0c8ff', muted: '#8060a0',
        accent: '#ffee00', accentDim: '#8a8000',
        line: '#2a0a40', danger: '#ff3366',
        sqLight: '#2a0040', sqDark: '#0f0020',
        white: '#00ffff', black: '#ff00aa',
        scanline: 'rgba(255,0,170,0.025)', glow: 'rgba(255,0,170,0.10)',
        accentGlow: 'rgba(255,238,0,0.45)', accentHover: 'rgba(255,238,0,0.5)',
      },
    };
    const THEME_KEYS = ['classic', 'inferno', 'hazard', 'toxic', 'arctic', 'neon'];
    let currentTheme = 'toxic';  // default matches the original page aesthetic

    };

    // Recolor every SVG data-URI for the active theme.
    // The Wikipedia-designed SVGs use %23fff and %23000 for their fill/stroke
    // colors. Swapping those to the theme's white/black colors re-paints the
    // pieces while preserving all the stroke detail and highlight work.
    // %23 is the URL-encoded form of #, so we can rewrite the whole URI.
    function recolorPieces(whiteHex, blackHex) {
      // URL-encode the target colors: strip # and prepend %23
      const wEnc = '%23' + whiteHex.replace('#', '');
      const bEnc = '%23' + blackHex.replace('#', '');
      // Placeholders that won't collide with either the source tokens or each
      // other, so we can do a safe two-pass swap (naive two-step replace would
      // clobber the first replacement).
      const TMP_W = '%23__WHITE__';
      const TMP_B = '%23__BLACK__';
      const out = {};
      for (const key in BASE_PIECE_SVGS) {
        out[key] = BASE_PIECE_SVGS[key]
          .split('%23fff').join(TMP_W)
          .split('%23000').join(TMP_B)
          .split(TMP_W).join(wEnc)
          .split(TMP_B).join(bEnc);
      }
      return out;
    }

    // Holds the currently-themed piece SVGs. Rebuilt whenever the theme
    // changes. chessboard.js calls pieceTheme() on each re-render, so we
    // just repopulate this object and trigger a board re-render.
    // IMPORTANT: must be initialized BEFORE the Chessboard constructor,
    // because chessboard.js calls pieceTheme() immediately during init.
    let THEMED_PIECE_SVGS = recolorPieces(THEMES[currentTheme].white, THEMES[currentTheme].black);

    const board = Chessboard('board', {
      draggable: true,
      position: 'start',
      onDragStart,
      onDrop,
      onSnapEnd,
      // Piece SVGs come from the themed lookup table (rebuilt on theme change).
      pieceTheme: function(piece) { return THEMED_PIECE_SVGS[piece]; },
    });
    window.addEventListener('resize', board.resize);

    // Apply a theme by name: writes CSS variables, recolors pieces, re-renders
    // the board, and updates the switch panel's active-state visuals.
    function applyTheme(name) {
      const t = THEMES[name];
      if (!t) return;
      currentTheme = name;

      // Write all theme values to CSS custom properties on :root. This
      // re-themes the chrome (bg, panel, text, accent) AND the board squares
      // in a single pass since the square CSS now reads var(--sq-light/dark).
      const root = document.documentElement;
      root.style.setProperty('--bg',            t.bg);
      root.style.setProperty('--panel',         t.panel);
      root.style.setProperty('--ink',           t.ink);
      root.style.setProperty('--muted',         t.muted);
      root.style.setProperty('--accent',        t.accent);
      root.style.setProperty('--accent-dim',    t.accentDim);
      root.style.setProperty('--line',          t.line);
      root.style.setProperty('--danger',        t.danger);
      root.style.setProperty('--sq-light',      t.sqLight);
      root.style.setProperty('--sq-dark',       t.sqDark);
      root.style.setProperty('--scanline-tint', t.scanline);
      root.style.setProperty('--glow-tint',     t.glow);
      root.style.setProperty('--accent-glow',   t.accentGlow);
      root.style.setProperty('--accent-hover',  t.accentHover);

      // Rebuild the piece SVGs with the theme's white/black fills and trigger
      // a board re-render at the current position so the pieces repaint.
      THEMED_PIECE_SVGS = recolorPieces(t.white, t.black);
      const fen = localChess.fen();
      board.position(fen, false);  // false = no animation, instant repaint

      // Update switch panel: mark the clicked one active, everyone else inactive
      document.querySelectorAll('.theme-sw').forEach(function(el) {
        el.classList.toggle('active', el.dataset.theme === name);
      });
    }

    // Build the theme switch row once on page load.
    // Each switch is a colored tile with the theme's 'sig' color as its background,
    // plus a small label underneath showing the theme name.
    function buildThemeSwitches() {
      const container = document.getElementById('theme-switches');
      if (!container) return;
      THEME_KEYS.forEach(function(key) {
        const theme = THEMES[key];
        const el = document.createElement('div');
        el.className = 'theme-sw';
        el.dataset.theme = key;
        el.style.background = theme.sig;
        el.title = theme.label;
        const label = document.createElement('span');
        label.className = 'label';
        label.textContent = theme.label;
        el.appendChild(label);
        el.addEventListener('click', function() { applyTheme(key); });
        container.appendChild(el);
      });
    }

    buildThemeSwitches();
    applyTheme(currentTheme);  // Initialize with the default theme

    function renderMoves() {
      const history = localChess.history();
      if (history.length === 0) {
        movesEl.textContent = 'No moves yet.';
        return;
      }
      let html = '';
      for (let i = 0; i < history.length; i += 2) {
        const n = Math.floor(i / 2) + 1;
        html += `<span class="ply">${n}.</span>${history[i]} ${history[i + 1] || ''} `;
      }
      movesEl.innerHTML = html;
      movesEl.scrollTop = movesEl.scrollHeight;
    }

    function applyState(state) {
      // Resync the local chess instance from the authoritative FEN.
      localChess.load(state.fen);
      board.position(state.fen, false);
      fenEl.textContent = state.fen;
      statusEl.textContent = state.status;
      statusEl.classList.toggle('check', /check/i.test(state.status));
      renderMoves();
    }

    function connect() {
      ws = new WebSocket(`${wsProto}://${location.host}/play`);
      ws.onopen = () => setConnected(true);
      ws.onclose = () => { setConnected(false); setTimeout(connect, 1500); };
      ws.onerror = () => setConnected(false);
      ws.onmessage = (ev) => {
        let msg;
        try { msg = JSON.parse(ev.data); } catch { return; }
        if (msg.type === 'state') {
          applyState(msg);
        } else if (msg.type === 'moveRejected') {
          // Server rejected our optimistic move - undo it locally.
          localChess.undo();
          board.position(localChess.fen());
          flashStatus('Illegal move');
        }
      };
    }

    function flashStatus(txt) {
      const original = statusEl.textContent;
      statusEl.textContent = txt;
      statusEl.style.color = 'var(--danger)';
      setTimeout(() => {
        statusEl.textContent = original;
        statusEl.style.color = '';
      }, 1200);
    }

    resetBtn.addEventListener('click', () => {
      if (confirm('Reset the game? This will clear the board for everyone watching in Otherside.')) {
        ws.send(JSON.stringify({ type: 'reset' }));
      }
    });

    connect();
  </script>
</body>
</html>
