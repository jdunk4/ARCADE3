<m-group>
  <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       ARCADE3 — No-Streaming Cabinet  (Wario Land SNES 2.0)
       Architecture: EmulatorJS runs directly in player's browser
       via <m-frame>, no Railway emulator server required.
       ROM served from GitHub Pages. Controller uses postMessage.
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->

  <!-- 3D cabinet model (shared from ARCADE1) -->
  <m-model
    src="https://raw.githubusercontent.com/jdunk4/ARCADE1/main/MODELS/ArcadeMachineFinal.glb"
    y="0" scale="1">
  </m-model>

  <!-- Cabinet screen — shows preview image until game launches -->
  <m-image
    id="screen"
    src="https://raw.githubusercontent.com/jdunk4/ARCADE3/main/SCREEN/wario-land-preview.png"
    width="1.75" height="1.25"
    y="2.69" z="0.626" rx="-18">
  </m-image>

  <!-- Cabinet labels -->
  <m-label
    content="WARIO LAND"
    y="0.65" z="0.38"
    width="0.9" height="0.1"
    font-size="10" color="#ffcc00" alignment="center">
  </m-label>

  <m-label
    id="completion-label"
    content="0 players completed"
    y="0.52" z="0.38"
    width="0.9" height="0.1"
    font-size="10" color="#aaaaff" alignment="center">
  </m-label>

  <m-label
    id="status-label"
    content=""
    y="0.38" z="0.38"
    width="0.85" height="0.12"
    font-size="11" color="#ffff00" alignment="center">
  </m-label>

  <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       INFO CARD — shows on proximity approach
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
  <m-image
    id="info-card"
    src="https://raw.githubusercontent.com/jdunk4/ARCADE3/main/INFOCARDs/info-card-wario.png"
    width="1.4" height="2.23"
    x="1.9" y="2.2" z="1.2" ry="-15"
    visible="false">
    <m-interaction id="card-link-btn" prompt="🌐 Open in browser" range="3.5">
    </m-interaction>
  </m-image>

  <!-- Proximity probe — reveals info card when player approaches -->
  <m-position-probe range="6.0" id="probe"></m-position-probe>

  <!-- Play interaction prompt -->
  <m-interaction
    id="play-btn"
    prompt="Press E to Play Wario Land SNES 2.0"
    range="4.0" y="1.1">
  </m-interaction>

  <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       GAME FRAME — EmulatorJS runs directly in the browser here.
       Hidden until player presses E. Positioned above control panel.
       Uses m-frame which embeds a web page as a panel in 3D space.
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
  <m-frame
    id="game-frame"
    src=""
    width="640" height="480"
    y="2.69" z="0.63" rx="-18"
    visible="false">
  </m-frame>

  <!-- ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       CONTROLLER — SNES pad (visual only in MML world;
       real inputs from Gamepad API go via postMessage to the frame)
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
  <m-group id="controller-root" y="0.9" z="0.55">
    <m-cube width="0.9" height="0.18" depth="0.42" color="#1a0505" rx="8"></m-cube>
    <m-cube x="-0.38" y="-0.12" z="0.04" width="0.22" height="0.32" depth="0.36" color="#1a0505" rx="12"></m-cube>
    <m-cube x="0.38" y="-0.12" z="0.04" width="0.22" height="0.32" depth="0.36" color="#1a0505" rx="12"></m-cube>
    <!-- D-pad -->
    <m-cube id="btn-dpad-up"    x="-0.3"  y="0.095" z="-0.04" width="0.06" height="0.01" depth="0.06" color="#3a3a5c"></m-cube>
    <m-cube id="btn-dpad-down"  x="-0.3"  y="0.095" z="0.06"  width="0.06" height="0.01" depth="0.06" color="#3a3a5c"></m-cube>
    <m-cube id="btn-dpad-left"  x="-0.36" y="0.095" z="0.01"  width="0.06" height="0.01" depth="0.06" color="#3a3a5c"></m-cube>
    <m-cube id="btn-dpad-right" x="-0.24" y="0.095" z="0.01"  width="0.06" height="0.01" depth="0.06" color="#3a3a5c"></m-cube>
    <!-- Face buttons -->
    <m-sphere id="btn-a" x="0.36" y="0.11" z="0.0"   radius="0.038" color="#cc2222"></m-sphere>
    <m-sphere id="btn-b" x="0.30" y="0.11" z="0.06"  radius="0.038" color="#1aaa5c"></m-sphere>
    <m-sphere id="btn-x" x="0.3"  y="0.11" z="-0.06" radius="0.038" color="#2244cc"></m-sphere>
    <m-sphere id="btn-y" x="0.24" y="0.11" z="0.0"   radius="0.038" color="#ccaa00"></m-sphere>
    <!-- Shoulder buttons -->
    <m-cube id="btn-lb" x="-0.38" y="0.12" z="-0.16" width="0.2" height="0.04" depth="0.08" color="#2a2a4a"></m-cube>
    <m-cube id="btn-rb" x="0.38"  y="0.12" z="-0.16" width="0.2" height="0.04" depth="0.08" color="#2a2a4a"></m-cube>
    <m-cube id="btn-lt" x="-0.38" y="0.16" z="-0.22" width="0.2" height="0.05" depth="0.1"  color="#2a2a4a"></m-cube>
    <m-cube id="btn-rt" x="0.38"  y="0.16" z="-0.22" width="0.2" height="0.05" depth="0.1"  color="#2a2a4a"></m-cube>
    <!-- Select / Start -->
    <m-sphere id="btn-select" x="-0.1" y="0.1" z="-0.02" radius="0.025" color="#3a3a5c"></m-sphere>
    <m-sphere id="btn-start"  x="0.1"  y="0.1" z="-0.02" radius="0.025" color="#3a3a5c"></m-sphere>
    <!-- Analog sticks -->
    <m-sphere id="btn-ls" x="-0.18" y="0.1" z="0.06" radius="0.055" color="#2a2a4a"></m-sphere>
    <m-sphere id="btn-rs" x="0.18"  y="0.1" z="0.08" radius="0.055" color="#2a2a4a"></m-sphere>
  </m-group>

  <script>
  (function(root) {
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // CONFIG
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    var ROM_FILE    = "Wario_Land_SNES_2_0.sfc";
    var ROM_CORE    = "snes";
    var ROM_ID      = "wario-land-snes-2";
    var ROM_TITLE   = "Wario Land SNES 2.0";
    var ROM_PREVIEW = "https://raw.githubusercontent.com/jdunk4/ARCADE3/main/SCREEN/wario-land-preview.png";

    // GitHub Pages static host for game.html and ROM
    // ROM lives at: https://jdunk4.github.io/ARCADE3/rom/Wario_Land_SNES_2_0.sfc
    var GAME_BASE      = "https://jdunk4.github.io/ARCADE3/game.html";
    var BACKEND_SERVER = "https://gamer-production.up.railway.app"; // completions only
    var WALLET         = "anonymous";

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // HELPERS
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function set(id, attr, val) {
      var e = root.querySelector("#" + id);
      if (e) e.setAttribute(attr, val);
    }

    function getGameUrl() {
      return GAME_BASE
        + "?rom="    + encodeURIComponent(ROM_FILE)
        + "&core="   + encodeURIComponent(ROM_CORE)
        + "&id="     + encodeURIComponent(ROM_ID)
        + "&wallet=" + encodeURIComponent(WALLET);
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // STATE
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    var gameActive   = false;
    var pollingActive = false;
    var gameFrame    = null; // reference to the <m-frame> element

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // CONTROLLER — button visual maps (identical to ARCADE2)
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    var gamepadToSNES = {
      0:"b", 1:"a", 2:"y", 3:"x",
      4:"l", 5:"r",
      8:"select", 9:"start",
      12:"up", 13:"down", 14:"left", 15:"right"
    };

    var buttonMap = {
      0:{id:"btn-a",         color:"#ff5555", pressY:0.095},
      1:{id:"btn-b",         color:"#44ff88", pressY:0.095},
      2:{id:"btn-x",         color:"#5588ff", pressY:0.095},
      3:{id:"btn-y",         color:"#ffee44", pressY:0.095},
      4:{id:"btn-lb",        color:"#8877ff", pressY:0.10},
      5:{id:"btn-rb",        color:"#8877ff", pressY:0.10},
      6:{id:"btn-lt",        color:"#ff8844", pressY:0.14},
      7:{id:"btn-rt",        color:"#ff8844", pressY:0.14},
      8:{id:"btn-select",    color:"#aaaaff", pressY:0.085},
      9:{id:"btn-start",     color:"#aaaaff", pressY:0.085},
      10:{id:"btn-ls",       color:"#66ddff", pressY:0.085},
      11:{id:"btn-rs",       color:"#66ddff", pressY:0.085},
      12:{id:"btn-dpad-up",  color:"#ffffff", pressY:0.08},
      13:{id:"btn-dpad-down",color:"#ffffff", pressY:0.08},
      14:{id:"btn-dpad-left",color:"#ffffff", pressY:0.08},
      15:{id:"btn-dpad-right",color:"#ffffff",pressY:0.08}
    };

    var defaultColors = {
      0:"#cc2222", 1:"#1aaa5c", 2:"#2244cc", 3:"#ccaa00",
      4:"#2a2a4a", 5:"#2a2a4a", 6:"#2a2a4a", 7:"#2a2a4a",
      8:"#3a3a5c", 9:"#3a3a5c", 10:"#2a2a4a", 11:"#2a2a4a",
      12:"#3a3a5c", 13:"#3a3a5c", 14:"#3a3a5c", 15:"#3a3a5c"
    };

    var defaultY = {
      0:0.11, 1:0.11, 2:0.11, 3:0.11,
      4:0.12, 5:0.12, 6:0.16, 7:0.16,
      8:0.1,  9:0.1,  10:0.1, 11:0.1,
      12:0.095, 13:0.095, 14:0.095, 15:0.095
    };

    // A/B and X/Y are swapped on standard gamepad vs SNES layout
    var remapIndex = {
      0:1, 1:0, 2:3, 3:2,
      4:4, 5:5, 6:6, 7:7,
      8:8, 9:9, 10:10, 11:11,
      12:12, 13:13, 14:14, 15:15
    };

    var buttonStates = {};

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // POST MESSAGE — send controller input to the game iframe.
    // game.html listens for these and injects into EmulatorJS.
    // We target the <m-frame>'s contentWindow via postMessage.
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function sendGameInput(key, type) {
      if (!gameActive) return;
      var msg = JSON.stringify({ type: type, key: key, source: "arcade3" });
      // postMessage to the m-frame's inner iframe (all origins accepted on game side)
      try {
        if (gameFrame && gameFrame.contentWindow) {
          gameFrame.contentWindow.postMessage(msg, "*");
        }
      } catch(e) {}
      // Also broadcast to all frames as fallback (MML iframe nesting varies)
      try {
        var frames = window.frames;
        for (var i = 0; i < frames.length; i++) {
          try { frames[i].postMessage(msg, "*"); } catch(e2) {}
        }
      } catch(e) {}
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // BUTTON VISUALS + INPUT FORWARDING
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function setButtonPressed(rawIndex, di, pressed) {
      var map = buttonMap[di];
      if (!map) return;
      var elem = root.querySelector("#" + map.id);
      if (!elem) return;

      if (pressed && !buttonStates[di]) {
        buttonStates[di] = true;
        elem.setAttribute("color", map.color);
        elem.setAttribute("y", map.pressY);
        var k = gamepadToSNES[rawIndex];
        if (k) sendGameInput(k, "keyDown");

      } else if (!pressed && buttonStates[di]) {
        buttonStates[di] = false;
        elem.setAttribute("color", defaultColors[di] || "#3a3a5c");
        elem.setAttribute("y", defaultY[di]);
        var k = gamepadToSNES[rawIndex];
        if (k) sendGameInput(k, "keyUp");
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // GAMEPAD POLLING
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function getBestGamepad() {
      var gps = navigator.getGamepads ? navigator.getGamepads() : [];
      for (var i = 0; i < gps.length; i++)
        if (gps[i] && gps[i].mapping === "standard") return gps[i];
      for (var j = 0; j < gps.length; j++)
        if (gps[j]) return gps[j];
      return null;
    }

    function poll() {
      if (pollingActive) return;
      pollingActive = true;
      function loop() {
        var gp = getBestGamepad();
        if (gp) {
          gp.buttons.forEach(function(btn, rawIndex) {
            var di = remapIndex.hasOwnProperty(rawIndex) ? remapIndex[rawIndex] : rawIndex;
            setButtonPressed(rawIndex, di, btn.pressed || btn.value > 0.5);
          });

          var axisX = gp.axes[0] || 0;
          var axisY = gp.axes[1] || 0;
          var T = 0.5;

          // Animate analog sticks visually
          var ls = root.querySelector("#btn-ls");
          var rs = root.querySelector("#btn-rs");
          if (ls) {
            ls.setAttribute("x", -0.18 + axisX * 0.04);
            ls.setAttribute("z", 0.06  + axisY * 0.04);
          }
          if (rs) {
            rs.setAttribute("x", 0.18 + (gp.axes[2] || 0) * 0.04);
            rs.setAttribute("z", 0.08 + (gp.axes[3] || 0) * 0.04);
          }

          // Axis → D-pad fallback (only if d-pad not already held)
          if (!buttonStates[14] && !buttonStates[15] && !buttonStates[12] && !buttonStates[13]) {
            if      (axisX < -T) sendGameInput("left",  "keyDown");
            else if (axisX >  T) sendGameInput("right", "keyDown");
            else { sendGameInput("left", "keyUp"); sendGameInput("right", "keyUp"); }

            if      (axisY < -T) sendGameInput("up",   "keyDown");
            else if (axisY >  T) sendGameInput("down", "keyDown");
            else { sendGameInput("up", "keyUp"); sendGameInput("down", "keyUp"); }
          }
        }
        requestAnimationFrame(loop);
      }
      loop();
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // GAME LAUNCH — no WebSocket, no server emulator.
    // Just point <m-frame> at game.html on GitHub Pages.
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function launchGame() {
      gameActive = true;
      gameFrame  = root.querySelector("#game-frame");
      var url    = getGameUrl();

      set("status-label", "content", "Loading emulator…");
      set("play-btn",     "prompt",  "Press E to Close");

      // Point the frame at game.html — EmulatorJS boots in the player's browser
      if (gameFrame) {
        gameFrame.setAttribute("src", url);
        gameFrame.setAttribute("visible", "true");
      }
      // Hide the static preview image (game frame covers it)
      set("screen", "visible", "false");
      set("status-label", "content", "");
    }

    function closeGame() {
      gameActive = false;
      if (gameFrame) {
        gameFrame.setAttribute("src", "");
        gameFrame.setAttribute("visible", "false");
      }
      set("screen",       "visible", "true");
      set("screen",       "src",     ROM_PREVIEW);
      set("status-label", "content", "");
      set("play-btn",     "prompt",  "Press E to Play " + ROM_TITLE);
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // COMPLETION TRACKING (lightweight — just a POST, no emulator server)
    // game.html fires window.parent.postMessage({type:"completion"}) when
    // the player reaches the credits / end screen.
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    window.addEventListener("message", function(evt) {
      try {
        var data = typeof evt.data === "string" ? JSON.parse(evt.data) : evt.data;
        if (data && data.source === "arcade3-game") {
          if (data.type === "completion") logCompletion();
          if (data.type === "ready") set("status-label", "content", "");
        }
      } catch(e) {}
    });

    function logCompletion() {
      fetch(BACKEND_SERVER + "/complete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ wallet: WALLET, rom: ROM_ID })
      }).then(function() { refreshCompletionCount(); }).catch(function(){});
    }

    function refreshCompletionCount() {
      fetch(BACKEND_SERVER + "/completions/" + ROM_ID)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var count = data.count || 0;
          set("completion-label", "content",
            count + " player" + (count !== 1 ? "s" : "") + " completed");
        }).catch(function(){});
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // BOOT
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    setTimeout(function() {
      // Start gamepad polling immediately (visual feedback even before game)
      poll();
      window.addEventListener("gamepadconnected", function() {
        if (!pollingActive) poll();
      });

      // Play / close button
      var playBtn = root.querySelector("#play-btn");
      if (playBtn) playBtn.addEventListener("interact", function() {
        if (gameActive) closeGame();
        else launchGame();
      });

      // Info card → open in full browser tab
      var cardBtn = root.querySelector("#card-link-btn");
      if (cardBtn) cardBtn.addEventListener("interact", function() {
        window.open(getGameUrl(), "_blank");
      });

      // Proximity probe — show/hide info card, close game on leave
      var probe = root.querySelector("#probe");
      if (probe) {
        probe.addEventListener("positionenter", function() {
          set("info-card", "visible", "true");
        });
        probe.addEventListener("positionleave", function() {
          set("info-card", "visible", "false");
          if (gameActive) closeGame();
        });
      }

      refreshCompletionCount();
    }, 500);

  })(document.currentScript ? document.currentScript.closest("m-group") : document);
  </script>
</m-group>
